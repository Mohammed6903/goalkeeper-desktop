name: build

on:
  push:
    branches: [main, feat/desktop]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json — do not
      # also set "version" here or action-setup errors on the duplicate.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      # Linux → AppImage + deb; Windows → NSIS. electron-builder infers targets
      # from electron-builder.yml per-OS. GH_TOKEN avoids publish; --publish never.
      - name: Package
        run: pnpm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: goalkeeper-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
          if-no-files-found: ignore
          retention-days: 14
