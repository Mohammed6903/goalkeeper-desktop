appId: app.garageuniversity.goalkeeper
productName: GoalKeeper
copyright: Copyright © 2026 Mohammed

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

asarUnpack:
  - "**/*.node"

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Utility
  synopsis: Goals, projects and tasks with a deterministic urgency engine
  maintainer: Mohammed <shorupan@garageuniversity.app>
  desktop:
    StartupWMClass: GoalKeeper

win:
  icon: build/icon.png
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
